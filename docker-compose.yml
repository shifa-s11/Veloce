version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task-manager-db
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: task-manager-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password123@postgres:5432/taskmanager?sslmode=disable
      JWT_SECRET: super-secure-jwt-secret-key-32-characters-minimum
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      ALLOWED_ORIGINS: http://localhost:3000
      ADMIN_SECRET: admin-setup-secret
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: task-manager-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
