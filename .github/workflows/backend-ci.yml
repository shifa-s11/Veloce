name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build shared package
      run: npm run build -w @task-manager/shared

    - name: Generate Prisma client
      run: npx prisma generate --schema=backend/prisma/schema.prisma

    - name: Run Prisma migrations
      run: npx prisma migrate deploy --schema=backend/prisma/schema.prisma
      env:
        DATABASE_URL: postgresql://postgres:password123@localhost:5432/testdb?sslmode=disable

    - name: Run Backend Tests
      run: npm run test -w @task-manager/backend
      env:
        DATABASE_URL: postgresql://postgres:password123@localhost:5432/testdb?sslmode=disable
        JWT_SECRET: super-secure-jwt-secret-key-32-characters-minimum
        ADMIN_SECRET: admin-setup-secret
